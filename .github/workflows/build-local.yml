name: build-local
on:
  push:
    tags: ['local-v*']
permissions:
  contents: read
  packages: write
jobs:
  build:
    strategy:
      matrix:
        app: [app1, app2]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#local-v}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.app }}
          push: true
          build-args: APP_VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}:${{ steps.ver.outputs.version }}
