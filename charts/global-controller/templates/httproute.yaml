apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: global-controller
  labels:
    {{- include "global-controller.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: http
  hostnames:
    - {{ .Values.hostname }}
  rules:
    - backendRefs:
        - name: global-controller-stable
          port: 80
          weight: 100
        - name: global-controller-canary
          port: 80
          weight: 0
