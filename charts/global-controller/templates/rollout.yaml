apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: global-controller
  labels:
    {{- include "global-controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    canary:
      canaryService: global-controller-canary
      stableService:  global-controller-stable
      trafficRouting:
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoute: global-controller
            namespace: {{ .Release.Namespace }}
      steps:
{{- range .Values.canary.steps }}
        - setWeight: {{ . }}
        - pause: { duration: {{ $.Values.canary.pause }} }
{{- end }}
      # TODO(future): replace the time-based pauses above with
      # `analysis:` blocks pointing at a Prometheus AnalysisTemplate
      # once the metrics stack is in place.
  selector:
    matchLabels:
      app.kubernetes.io/name: global-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: global-controller
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet: { path: /, port: http }
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
