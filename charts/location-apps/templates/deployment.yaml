{{- range $name, $app := .Values.apps }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "location-apps.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        {{- include "location-apps.labels" $ | nindent 8 }}
    spec:
      containers:
        - name: nginx
          image: "{{ $app.image.repository }}:{{ $app.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet: { path: /, port: http }
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
{{- end }}
